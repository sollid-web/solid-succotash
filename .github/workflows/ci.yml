name: CI Gatekeeper

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows you to run this manually if needed

jobs:
  quality-assurance:
    name: Code Validation & Testing
    runs-on: ubuntu-latest
    
    # Environment variables for the CI runner
    env:
      DJANGO_SETTINGS_MODULE: wolvcapital.settings
      SECRET_KEY: ci-test-key-only
      DEBUG: "True"
      DATABASE_URL: sqlite:///:memory: # Fast, isolated DB for testing

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up future builds

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 4. Check for Missing Migrations
        # This catches the mistake of changing models but forgetting 'makemigrations'
        run: |
          python manage.py makemigrations --check --dry-run || (echo ">>> ERROR: You have model changes but forgot to commit migration files!" && exit 1)

      - name: 5. Lint with Ruff
        # Ensures code "beauty" and standard formatting
        run: python -m ruff check . --fix

      - name: 6. Static Type Check (Mypy)
        # Prevents "mysterious" type errors in your logic
        run: python -m mypy -p core --ignore-missing-imports

      - name: 7. Run Django Tests
        # Final confirmation that the logic works
        run: python manage.py test -v 2
        
