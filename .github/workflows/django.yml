name: Django CI — Block Faulty Deploys

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Django System Check + Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "True"
      RESEND_API_KEY: test-key
      ROI_CRON_SECRET: test-secret
      DRIP_CRON_SECRET: test-secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system check
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate --run-syncdb

      - name: Run tests
        run: python manage.py test --verbosity=2

  deploy-gate:
    name: Deploy Gate (must pass before Railway deploys)
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: All checks passed — safe to deploy
        run: echo "✅ CI passed. Railway will now deploy."
