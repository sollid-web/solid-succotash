<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#04142e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WolvSupport" />
  <title>WolvCapital Agent</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #04142e; color: #eaf3ff; min-height: 100vh; }

    /* AUTH */
    #auth { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .auth-card { background: #071c3f; border: 1px solid rgba(26,58,110,1); border-radius: 20px; padding: 32px 28px; width: 100%; max-width: 380px; }
    .auth-logo { font-size: 28px; font-weight: 800; color: #eaf3ff; margin-bottom: 4px; }
    .auth-logo span { color: #2d8bff; }
    .auth-sub { color: #5a84b8; font-size: 13px; margin-bottom: 28px; }
    .auth-label { font-size: 12px; font-weight: 600; color: #a8bfd6; margin-bottom: 6px; display: block; }
    .auth-input { width: 100%; padding: 12px 14px; background: #04142e; border: 1px solid rgba(26,58,110,1); border-radius: 12px; color: #eaf3ff; font-size: 14px; outline: none; margin-bottom: 16px; }
    .auth-input:focus { border-color: #2d8bff; }
    .auth-btn { width: 100%; padding: 13px; background: linear-gradient(135deg,#1565ff,#2d8bff); border: none; border-radius: 12px; color: white; font-size: 15px; font-weight: 700; cursor: pointer; }
    .auth-err { color: #f87171; font-size: 12px; margin-top: 8px; text-align: center; }

    /* APP */
    #app { display: none; flex-direction: column; height: 100vh; }
    .top-bar { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: #020b1a; border-bottom: 1px solid rgba(26,58,110,1); flex-shrink: 0; }
    .top-logo { font-size: 16px; font-weight: 800; flex: 1; }
    .top-logo span { color: #2d8bff; }
    .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #00e5a0; animation: pulse 2s infinite; }
    .badge { background: #ef4444; color: white; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px; min-width: 20px; text-align: center; }
    .logout-btn { background: none; border: 1px solid rgba(26,58,110,1); color: #5a84b8; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }

    /* MAIN */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* SESSIONS */
    .sessions { width: 280px; border-right: 1px solid rgba(26,58,110,1); display: flex; flex-direction: column; flex-shrink: 0; background: #020b1a; }
    .sessions-hdr { padding: 14px 16px; border-bottom: 1px solid rgba(26,58,110,1); font-size: 12px; font-weight: 700; color: #5a84b8; text-transform: uppercase; letter-spacing: .08em; }
    .sessions-list { flex: 1; overflow-y: auto; }
    .session-item { padding: 14px 16px; border-bottom: 1px solid rgba(26,58,110,0.5); cursor: pointer; transition: background .2s; border-left: 3px solid transparent; }
    .session-item:hover { background: rgba(21,101,255,.06); }
    .session-item.active { background: rgba(21,101,255,.12); border-left-color: #2d8bff; }
    .session-name { font-size: 13px; font-weight: 600; color: #eaf3ff; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-email { font-size: 11px; color: #5a84b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
    .session-status { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .status-waiting { background: rgba(245,158,11,.15); color: #f59e0b; border: 1px solid rgba(245,158,11,.3); }
    .status-active { background: rgba(0,229,160,.1); color: #00e5a0; border: 1px solid rgba(0,229,160,.25); }
    .session-time { font-size: 10px; color: #5a84b8; margin-top: 4px; }
    .empty-sessions { padding: 40px 20px; text-align: center; color: #5a84b8; font-size: 13px; }
    .empty-sessions .emoji { font-size: 40px; margin-bottom: 12px; }

    /* CHAT */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-hdr { padding: 14px 20px; border-bottom: 1px solid rgba(26,58,110,1); background: #020b1a; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .chat-hdr-av { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,#1565ff,#2d8bff); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .chat-hdr-info { flex: 1; min-width: 0; }
    .chat-hdr-name { font-size: 14px; font-weight: 700; color: #eaf3ff; }
    .chat-hdr-email { font-size: 11px; color: #5a84b8; }
    .close-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(220,38,38,.3); background: rgba(220,38,38,.1); color: #f87171; font-size: 12px; font-weight: 600; cursor: pointer; }
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { display: flex; gap: 8px; align-items: flex-end; }
    .msg.user { flex-direction: row; }
    .msg.agent { flex-direction: row-reverse; }
    .msg-av { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .msg-av.user-av { background: #071c3f; border: 1px solid rgba(26,58,110,1); }
    .msg-av.agent-av { background: linear-gradient(135deg,#059669,#10b981); }
    .msg-av.ai-av { background: linear-gradient(135deg,#1565ff,#2d8bff); }
    .msg-bubble { max-width: 72%; }
    .msg-text { padding: 9px 13px; border-radius: 14px; font-size: 13px; line-height: 1.55; word-break: break-word; }
    .msg.user .msg-text { background: #071c3f; border: 1px solid rgba(26,58,110,1); color: #eaf3ff; border-radius: 14px 14px 14px 4px; }
    .msg.agent .msg-text { background: linear-gradient(135deg,#059669,#10b981); color: white; border-radius: 14px 14px 4px 14px; }
    .msg.ai .msg-text { background: linear-gradient(135deg,#1565ff,#2d8bff); color: white; border-radius: 14px 14px 4px 14px; }
    .msg-time { font-size: 10px; color: #5a84b8; margin-top: 3px; padding: 0 3px; }
    .msg.agent .msg-time, .msg.ai .msg-time { text-align: right; }

    /* REPLY */
    .reply-area { padding: 12px 16px; border-top: 1px solid rgba(26,58,110,1); background: #020b1a; display: flex; gap: 10px; flex-shrink: 0; }
    .reply-input { flex: 1; background: #071c3f; border: 1px solid rgba(26,58,110,1); border-radius: 12px; padding: 10px 14px; color: #eaf3ff; font-size: 13px; resize: none; outline: none; font-family: inherit; min-height: 44px; max-height: 120px; }
    .reply-input:focus { border-color: #2d8bff; }
    .send-btn { padding: 0 20px; border-radius: 12px; border: none; background: linear-gradient(135deg,#1565ff,#2d8bff); color: white; font-weight: 700; font-size: 13px; cursor: pointer; flex-shrink: 0; }
    .send-btn:disabled { opacity: .4; cursor: default; }

    /* NO SESSION */
    .no-session { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #5a84b8; gap: 12px; }
    .no-session .emoji { font-size: 52px; }
    .no-session h2 { color: #eaf3ff; font-size: 18px; }

    /* MOBILE */
    @media (max-width: 640px) {
      .sessions { width: 100%; position: absolute; top: 52px; bottom: 0; left: 0; z-index: 10; transform: translateX(0); transition: transform .3s; }
      .sessions.hidden { transform: translateX(-100%); }
      .chat-area { position: absolute; top: 52px; bottom: 0; left: 0; right: 0; }
      .back-btn { display: flex !important; }
    }
    .back-btn { display: none; align-items: center; gap: 6px; background: none; border: none; color: #2d8bff; font-size: 14px; font-weight: 600; cursor: pointer; padding: 0; }

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    @keyframes slideIn { from { transform: translateY(10px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    .msg { animation: slideIn .2s ease; }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth">
  <div class="auth-card">
    <div class="auth-logo">Wolv<span>Capital</span></div>
    <div class="auth-sub">Agent Support Panel</div>
    <label class="auth-label">Email</label>
    <input class="auth-input" id="loginEmail" type="email" placeholder="admin@wolvcapital.com" />
    <label class="auth-label">Password</label>
    <input class="auth-input" id="loginPassword" type="password" placeholder="••••••••" />
    <button class="auth-btn" onclick="login()">Sign In as Agent →</button>
    <div class="auth-err" id="authErr"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="top-bar">
    <div class="online-dot"></div>
    <div class="top-logo">Wolv<span>Capital</span> Support</div>
    <span class="badge" id="badgeCount" style="display:none">0</span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="main">
    <!-- Sessions List -->
    <div class="sessions" id="sessionsList">
      <div class="sessions-hdr">Live Inbox</div>
      <div class="sessions-list" id="sessionsContainer">
        <div class="empty-sessions">
          <div class="emoji">🎉</div>
          No active sessions
        </div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
      <div class="no-session" id="noSession">
        <div class="emoji">💬</div>
        <h2>Select a session</h2>
        <p>Waiting sessions appear on the left</p>
      </div>
      <div id="chatView" style="display:none; flex-direction:column; height:100%;">
        <div class="chat-hdr">
          <button class="back-btn" id="backBtn" onclick="showSessions()">← Back</button>
          <div class="chat-hdr-av" id="chatHdrAv">U</div>
          <div class="chat-hdr-info">
            <div class="chat-hdr-name" id="chatHdrName">User</div>
            <div class="chat-hdr-email" id="chatHdrEmail"></div>
          </div>
          <button class="close-btn" onclick="closeCurrentSession()">Close</button>
        </div>
        <div class="messages" id="messagesContainer"></div>
        <div class="reply-area">
          <textarea class="reply-input" id="replyInput" placeholder="Type reply… (Enter to send)" rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply()}"
            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendReply()">Send ➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'https://api.wolvcapital.com'
  let token = localStorage.getItem('agentToken') || ''
  let selectedSessionId = null
  let prevSessionCount = 0
  let sessionsData = []
  let messagesData = []
  let sessionPollInterval = null
  let messagePollInterval = null
  let notifGranted = false

  // ── INIT ──────────────────────────────────────────────
  window.onload = () => {
    if (token) showApp()
    // Request notification permission
    if ('Notification' in window) {
      Notification.requestPermission().then(p => { notifGranted = p === 'granted' })
    }
  }

  // ── AUTH ──────────────────────────────────────────────
  async function login() {
    const email = document.getElementById('loginEmail').value.trim()
    const password = document.getElementById('loginPassword').value.trim()
    const errEl = document.getElementById('authErr')
    errEl.textContent = ''

    if (!email || !password) { errEl.textContent = 'Please enter email and password'; return }

    try {
      const res = await fetch(`${API}/api/auth/login/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      const data = await res.json()
      if (!res.ok) { errEl.textContent = data.detail || data.error || 'Login failed'; return }

      token = data.token || data.access || ''
      if (!token) { errEl.textContent = 'No token received'; return }

      // Verify is_staff using me endpoint
      try {
        const meRes = await fetch(`${API}/api/auth/me/`, {
          headers: { Authorization: `Token ${token}`, Accept: 'application/json' }
        })
        const me = await meRes.json()
        if (!me.is_staff && !me.is_superuser) {
          errEl.textContent = 'Access denied. Staff accounts only.'
          return
        }
      } catch {
        // If me endpoint fails, allow login anyway if token exists
      }

      localStorage.setItem('agentToken', token)
      localStorage.setItem('agentTokenType', 'Token')
      showApp()
    } catch(e) {
      errEl.textContent = 'Connection error. Check your internet.'
    }
  }

  function logout() {
    token = ''
    localStorage.removeItem('agentToken')
    clearInterval(sessionPollInterval)
    clearInterval(messagePollInterval)
    document.getElementById('auth').style.display = 'flex'
    document.getElementById('app').style.display = 'none'
  }

  function showApp() {
    document.getElementById('auth').style.display = 'none'
    document.getElementById('app').style.display = 'flex'
    startPolling()
  }

  // ── POLLING ───────────────────────────────────────────
  function startPolling() {
    fetchSessions()
    sessionPollInterval = setInterval(fetchSessions, 3000)
  }

  async function fetchSessions() {
    try {
      const res = await fetch(`${API}/api/chat/sessions/`, {
        headers: { Authorization: `Token ${token}` }
      })
      if (res.status === 401) { logout(); return }
      const data = await res.json()
      const sessions = data.sessions || []

      // Notify on new session
      if (sessions.length > prevSessionCount && prevSessionCount >= 0) {
        const newest = sessions[0]
        triggerAlert(`🚨 ${newest.user_name || newest.user_email || 'Someone'} needs help!`)
      }
      prevSessionCount = sessions.length
      sessionsData = sessions
      renderSessions(sessions)
    } catch {}
  }

  async function fetchMessages(sessionId) {
    try {
      const res = await fetch(`${API}/api/chat/messages/${sessionId}/`)
      const data = await res.json()
      const msgs = data.messages || []
      if (msgs.length !== messagesData.length) {
        messagesData = msgs
        renderMessages(msgs)
      }
    } catch {}
  }

  // ── NOTIFICATIONS ─────────────────────────────────────
  function triggerAlert(text) {
    // Browser notification
    if (notifGranted) {
      new Notification('WolvCapital Support', { body: text, icon: '/icon-192.png' })
    }
    // Vibrate
    if ('vibrate' in navigator) navigator.vibrate([300, 100, 300, 100, 300])
    // Sound
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)()
      const osc = ctx.createOscillator()
      const gain = ctx.createGain()
      osc.connect(gain)
      gain.connect(ctx.destination)
      osc.frequency.value = 880
      gain.gain.value = 0.3
      osc.start()
      osc.stop(ctx.currentTime + 0.3)
      setTimeout(() => { osc.frequency.value = 660; osc.start(); osc.stop(ctx.currentTime + 0.3) }, 400)
    } catch {}
    // Flash title
    let count = 0
    const origTitle = document.title
    const flashInterval = setInterval(() => {
      document.title = count % 2 === 0 ? '🚨 NEW SESSION!' : origTitle
      if (++count > 10) { clearInterval(flashInterval); document.title = origTitle }
    }, 500)
  }

  // ── RENDER SESSIONS ───────────────────────────────────
  function renderSessions(sessions) {
    const container = document.getElementById('sessionsContainer')
    const badge = document.getElementById('badgeCount')

    if (sessions.length === 0) {
      badge.style.display = 'none'
      container.innerHTML = '<div class="empty-sessions"><div class="emoji">🎉</div><p>No active sessions</p></div>'
      return
    }

    badge.style.display = 'inline'
    badge.textContent = sessions.length

    container.innerHTML = sessions.map(s => `
      <div class="session-item ${s.session_id === selectedSessionId ? 'active' : ''}"
           onclick="selectSession('${s.session_id}')">
        <div class="session-name">${s.user_name || 'Unknown User'}</div>
        <div class="session-email">${s.user_email || s.session_id.slice(0,20)}</div>
        <span class="session-status ${s.status === 'waiting' ? 'status-waiting' : 'status-active'}">
          ${s.status === 'waiting' ? '⏳ Waiting' : '✅ Active'}
        </span>
        <div class="session-time">${new Date(s.human_requested_at).toLocaleTimeString()}</div>
      </div>
    `).join('')
  }

  // ── SELECT SESSION ────────────────────────────────────
  function selectSession(sessionId) {
    selectedSessionId = sessionId
    const session = sessionsData.find(s => s.session_id === sessionId)
    if (!session) return

    // Update header
    document.getElementById('chatHdrAv').textContent = (session.user_name || session.user_email || 'U')[0].toUpperCase()
    document.getElementById('chatHdrName').textContent = session.user_name || 'Unknown User'
    document.getElementById('chatHdrEmail').textContent = session.user_email || ''

    // Show chat
    document.getElementById('noSession').style.display = 'none'
    document.getElementById('chatView').style.display = 'flex'

    // Mobile: hide sessions list
    document.getElementById('sessionsList').classList.add('hidden')

    // Start message polling
    clearInterval(messagePollInterval)
    messagesData = []
    fetchMessages(sessionId)
    messagePollInterval = setInterval(() => fetchMessages(sessionId), 3000)

    renderSessions(sessionsData)
  }

  function showSessions() {
    document.getElementById('sessionsList').classList.remove('hidden')
  }

  // ── RENDER MESSAGES ───────────────────────────────────
  function renderMessages(messages) {
    const container = document.getElementById('messagesContainer')
    container.innerHTML = messages.map(m => {
      const isUser = m.role === 'user'
      const isAgent = m.role === 'assistant' && m.is_human_handover
      const isAI = m.role === 'assistant' && !m.is_human_handover
      const cls = isUser ? 'user' : isAgent ? 'agent' : 'ai'
      const avCls = isUser ? 'user-av' : isAgent ? 'agent-av' : 'ai-av'
      const avIcon = isUser ? '👤' : isAgent ? '🎧' : 'W'
      const time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
      return `
        <div class="msg ${cls}">
          <div class="msg-av ${avCls}">${avIcon}</div>
          <div class="msg-bubble">
            <div class="msg-text">${escHtml(m.content)}</div>
            <div class="msg-time">${isAgent ? '🎧 You · ' : isAI ? '🤖 AI · ' : ''}${time}</div>
          </div>
        </div>
      `
    }).join('')
    container.scrollTop = container.scrollHeight
  }

  // ── SEND REPLY ────────────────────────────────────────
  async function sendReply() {
    const input = document.getElementById('replyInput')
    const msg = input.value.trim()
    if (!msg || !selectedSessionId) return

    document.getElementById('sendBtn').disabled = true
    input.value = ''
    input.style.height = 'auto'

    try {
      await fetch(`${API}/api/chat/agent-reply/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Token ${token}` },
        body: JSON.stringify({ session_id: selectedSessionId, message: msg })
      })
      await fetchMessages(selectedSessionId)
    } catch {}

    document.getElementById('sendBtn').disabled = false
    input.focus()
  }

  // ── CLOSE SESSION ─────────────────────────────────────
  async function closeCurrentSession() {
    if (!selectedSessionId || !confirm('Close this session?')) return
    try {
      await fetch(`${API}/api/chat/sessions/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Token ${token}` },
        body: JSON.stringify({ session_id: selectedSessionId, action: 'close' })
      })
    } catch {}
    selectedSessionId = null
    clearInterval(messagePollInterval)
    document.getElementById('noSession').style.display = 'flex'
    document.getElementById('chatView').style.display = 'none'
    document.getElementById('sessionsList').classList.remove('hidden')
    fetchSessions()
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }
</script>
</body>
</html>
