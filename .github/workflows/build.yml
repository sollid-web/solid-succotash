name: Next.js Build Check

on:
  push:
    branches: [ main, master ] # Trigger on pushes to these branches
  pull_request:
    branches: [ main, master ] # Trigger on PRs to these branches

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use the version matching your local environment
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # Faster, cleaner install for CI environments

      - name: Build Next.js
        run: npm run build
        
